name: Sync from Upstream

on:
  schedule:
    # 每周一 UTC 02:00（北京时间周一 10:00）自动同步
    - cron: '0 2 * * 1'
  workflow_dispatch:
    # 支持手动触发
    inputs:
      force:
        description: 'Force sync even if no changes'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and sync
        run: |
          git remote add upstream https://github.com/hasaneyldrm/exercises-dataset.git
          git fetch upstream

          # 检查是否有新提交
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$REMOTE" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "✅ Already up to date with upstream. Nothing to sync."
            exit 0
          fi

          echo "🔄 Syncing changes from upstream..."
          git merge upstream/main --no-edit --strategy-option=theirs
          git push origin main
          echo "✅ Sync complete!"
